const{useState,useCallback,useMemo,useRef}=React;
const ALL_UNT=["Below UnT4","UnT1","UnT2","UnT3","UnT4","UnT5","UnT6","UnT7","UnT8","UnT9","UnT10","UnT11"];

const TEXTS={
A:{title:"Text A \u2014 Wombats",text:"Wombats are short, sturdy animals that live in burrows in the ground. They are found in parts of Australia, including forests, mountains and grasslands. Wombats are marsupials, which means they carry their young in a pouch \u2014 but unlike kangaroos, the wombat\u2019s pouch faces backwards so that dirt does not get inside when the wombat is digging.\n\nWombats are herbivores, meaning they only eat plants. Their diet includes grasses, roots and bark. They have strong teeth that keep growing throughout their lives, which helps them chew tough plant material. Wombats are mostly active at night, which makes them nocturnal animals.\n\nOne of the most unusual things about wombats is that their droppings are cube-shaped. Scientists believe this shape stops the droppings from rolling away, which helps wombats mark their territory. A wombat can produce up to 100 cube-shaped droppings in a single night.\n\nWombats can be found in national parks and wildlife sanctuaries across south-eastern Australia. However, some species, like the northern hairy-nosed wombat, are critically endangered. There are fewer than 300 of them left in the wild. Conservation programs are working to protect their habitat and increase their numbers."},
B:{title:"Text B \u2014 Screen Time and Teenagers",text:"How much time do you spend looking at a screen each day? If you\u2019re like most Australian teenagers, the answer is somewhere between five and seven hours \u2014 and that\u2019s not including time spent on screens for schoolwork.\n\nA recent report by the Australian Institute of Health and Welfare found that teenagers who spend more than two hours per day on recreational screen time are more likely to report feelings of loneliness, difficulty sleeping and lower levels of physical activity. The report also noted that rates of anxiety among young people have risen significantly over the past decade, during which time smartphone ownership among teenagers has gone from 20% to over 90%.\n\nHowever, the picture is not entirely negative. Screens also provide teenagers with valuable connections. Online communities can be a lifeline for young people in rural areas or those who feel isolated at school. Educational apps and videos allow students to learn at their own pace. And social media, while often criticised, can help teenagers develop a sense of identity and belonging.\n\nSome experts argue that it is not the amount of screen time that matters, but what teenagers are doing on their screens. Dr James Howard, a psychologist at the University of Sydney, suggests that \u2018passive scrolling\u2019 \u2014 mindlessly flicking through feeds without purpose \u2014 is far more harmful than active screen use such as creating content, video-calling friends or researching topics of interest.\n\nParents and schools are often caught in the middle. Banning screens entirely seems unrealistic in a world where digital literacy is essential. But allowing unlimited access creates its own risks. Finding the right balance requires ongoing conversation between young people and the adults in their lives \u2014 and perhaps a willingness from both sides to put the phone down occasionally."},
C:{title:"Text C \u2014 Should Schools Start Later?",text:"Every year, thousands of Australian teenagers drag themselves out of bed before dawn, arrive at school exhausted, and spend the first two periods struggling to concentrate. It is time we asked ourselves: are we setting our young people up to fail?\n\nSleep scientists have known for decades that adolescent brains are wired differently. During puberty, the body\u2019s internal clock shifts forward, making teenagers naturally inclined to fall asleep later and wake later. Dr Rachel Torres, a researcher at the University of Melbourne, puts it bluntly: \u201CAsking a teenager to be alert at 8:30 am is like asking an adult to be productive at 5:30 am.\u201D\n\nThe consequences of ignoring this science are serious. A 2019 study found that students sleeping fewer than seven hours per night were 58% more likely to report symptoms of depression. Sleep-deprived teenagers also show poorer academic results, weaker immune systems and increased risk-taking behaviour.\n\nSome schools overseas have already acted. In California, a law now requires most high schools to start no earlier than 8:30 am. Early results show improvements in attendance, grades and student wellbeing. Meanwhile, Australian schools continue with start times that haven\u2019t changed in generations.\n\nOf course, there are practical concerns. Later starts could create childcare problems for working parents, clash with after-school sport and shift the entire family schedule. These are real issues that deserve consideration.\n\nBut when we weigh convenience against the mental health, safety and academic success of an entire generation, the answer should be clear. Our teenagers deserve an education system that works with their biology, not against it. The alarm clock is ringing \u2014 it\u2019s time to wake up to the evidence."}
};

const SECTIONS=[
{id:"textA",title:"Section 1: Text A \u2014 Simple Comprehension (UnT4\u20136)",passage:"A",questions:[
  {id:"q1",type:"mcq",level:"UnT4",stem:"What type of animal is a wombat?",options:["A reptile","A bird","A marsupial","A fish"],answer:2,ms:"Literal recall \u2014 answer is stated directly in paragraph 1. A student at UnT4 can read simple texts with support and answer literal questions."},
  {id:"q2",type:"mcq",level:"UnT4",stem:"Where do wombats live?",options:["In trees","In burrows in the ground","In rivers","In the ocean"],answer:1,ms:"Literal recall \u2014 stated directly in the first sentence. Tests whether student can locate explicitly stated information."},
  {id:"q3",type:"written",level:"UnT4\u20135",stem:"What do wombats eat? Write one or two sentences using information from the text.",lines:3,ms:"WHAT TO LOOK FOR:\n\u2022 UnT4 (basic): Student writes something like \u2018Wombats eat plants\u2019 \u2014 recalls a single basic fact from the text.\n\u2022 UnT5 (developing): Student includes more detail \u2014 \u2018Wombats are herbivores which means they only eat plants. They eat grasses, roots and bark.\u2019 Uses sequenced detail and may quote or paraphrase from the text.\n\u2022 Below UnT4: Student cannot locate the information or writes something unrelated to the text."},
  {id:"q4",type:"mcq",level:"UnT5",stem:"What does the word \u2018nocturnal\u2019 mean in this text?",options:["Active during the day","Active at night","Able to fly","Able to swim"],answer:1,ms:"Vocabulary in context \u2014 the text defines nocturnal implicitly (\u2018mostly active at night, which makes them nocturnal\u2019). Tests whether student can use context to understand an unfamiliar word (UnT5 indicator)."},
  {id:"q5",type:"mcq",level:"UnT5",stem:"Why does the wombat\u2019s pouch face backwards?",options:["To keep the baby warm","So dirt doesn\u2019t get inside when digging","Because all marsupials have backwards pouches","To help the baby breathe"],answer:1,ms:"Locating specific information and understanding cause-effect \u2014 answer requires connecting \u2018pouch faces backwards\u2019 with \u2018so that dirt does not get inside when digging\u2019."},
  {id:"q6",type:"written",level:"UnT5\u20136",stem:"Retell the main information from this text in 3\u20134 sentences. Include the most important details.",lines:4,ms:"WHAT TO LOOK FOR:\n\u2022 UnT5 (developing): Recounts ideas from the text in some order but may include minor or irrelevant details. May retell everything rather than selecting key points. E.g. \u2018Wombats live in burrows. They eat plants. Their poo is cube shaped. They are nocturnal.\u2019\n\u2022 UnT6 (consolidating): Selects the MOST RELEVANT details and organises them logically. Covers multiple aspects (habitat, diet, unusual features, conservation status) without listing everything. E.g. \u2018Wombats are Australian marsupials that live in burrows and eat plants like grasses and bark. They are known for their cube-shaped droppings which help them mark their territory. Some species like the northern hairy-nosed wombat are critically endangered with fewer than 300 left.\u2019\n\u2022 Below UnT5: Writes only one detail or cannot retell coherently."},
  {id:"q7",type:"mcq",level:"UnT6",stem:"What is the purpose of this text?",options:["To persuade people to adopt a wombat","To entertain with a funny story","To inform readers about wombats","To give instructions on finding wombats"],answer:2,ms:"Identifies text purpose (UnT6 indicator: describes the purpose of informative, imaginative and persuasive texts). Student must recognise this is an informative text."},
  {id:"q8",type:"written",level:"UnT6",stem:"The text says cube-shaped droppings help wombats \u2018mark their territory\u2019. What does this mean? Why would it be important?",lines:3,ms:"WHAT TO LOOK FOR:\n\u2022 UnT6 (consolidating): Draws an inference using background knowledge. Student should explain that \u2018marking territory\u2019 means showing other animals that an area belongs to them. Should suggest WHY this matters \u2014 e.g. to protect their burrow, food supply, or keep other wombats away.\n\u2022 Partial (UnT5): Defines \u2018territory\u2019 correctly but doesn\u2019t explain why it\u2019s important.\n\u2022 Below UnT5: Cannot infer meaning beyond what is literally stated."},
]},
{id:"textB",title:"Section 2: Text B \u2014 Comprehension & Inference (UnT6\u20138)",passage:"B",questions:[
  {id:"q9",type:"mcq",level:"UnT6",stem:"What did the Australian Institute of Health and Welfare report find about teenagers with more than two hours of recreational screen time?",options:["They performed better at school","They were more likely to report loneliness, sleep difficulties and lower physical activity","They had stronger social connections","They were more creative"],answer:1,ms:"Locates specific information in a predictable text (UnT6). The answer is stated directly in paragraph 2. Tests whether student can find and correctly identify a specific detail."},
  {id:"q10",type:"mcq",level:"UnT6",stem:"What is the purpose of this text?",options:["To convince teenagers to stop using screens","To explain screen time effects and present different perspectives","To advertise a screen-time app","To instruct parents on setting limits"],answer:1,ms:"Identifies text purpose (UnT6). The text is primarily informative with some persuasive elements. The correct answer recognises both the informative purpose AND the multiple perspectives \u2014 this is more sophisticated than simply saying \u2018to inform\u2019."},
  {id:"q11",type:"written",level:"UnT6\u20137",stem:"The text mentions both negative and positive effects of screen time. List TWO negative effects and TWO positive effects from the text.",lines:5,ms:"WHAT TO LOOK FOR:\n\u2022 UnT6 (consolidating): Can locate and list relevant details from different parts of the text. Negatives (any 2): loneliness, sleep difficulties, lower physical activity, increased anxiety. Positives (any 2): connections for rural/isolated teens, educational apps, learning at own pace, identity and belonging, creating content, video-calling friends.\n\u2022 UnT7 (established): Organises the response clearly, may use own words rather than copying directly, and selects the most significant effects rather than minor ones.\n\u2022 Partial (UnT5): Can find one or two effects but mixes up positive and negative, or lists from only one paragraph.\n\u2022 Below UnT5: Cannot locate specific information or lists things not in the text."},
  {id:"q12",type:"mcq",level:"UnT7",stem:"Which is an OPINION rather than a fact?",options:["Smartphone ownership has gone from 20% to over 90%","Rates of anxiety have risen over the past decade","Passive scrolling is far more harmful than active screen use","Teenagers spend between five and seven hours on screens daily"],answer:2,ms:"Distinguishes fact from opinion (UnT7). The correct answer is an expert\u2019s judgement/claim, not a verified statistic. The other three options are presented as research findings or data. Students at UnT7 should recognise that \u2018far more harmful\u2019 is an evaluative claim, not a measured fact."},
  {id:"q13",type:"mcq",level:"UnT7",stem:"Which pair best describes the two main perspectives in this text?",options:["Teenagers think screens are good; parents think they are bad","Some see screen time as harmful; others argue it depends on how screens are used","Doctors support screens; teachers oppose them","Rural teenagers need screens; city teenagers do not"],answer:1,ms:"Recognises that texts present different viewpoints (UnT7). The text presents: (1) screen time is harmful (health data) vs (2) it depends on usage (Dr Howard\u2019s passive vs active distinction). Answer B captures this nuance. Students at UnT7 should identify both perspectives."},
  {id:"q14",type:"written",level:"UnT7",stem:"What is the main idea of this text? Write it in one or two sentences.",lines:3,ms:"WHAT TO LOOK FOR:\n\u2022 UnT7 (established): Identifies the MAIN IDEA (not just the topic). The main idea is: Screen time has both positive and negative effects on teenagers, and what matters most is HOW screens are used, not just how much time is spent. A good response captures this nuance.\n\u2022 Partial (UnT6): States the topic (\u2018it\u2019s about screen time\u2019 or \u2018screen time is bad for teenagers\u2019) but doesn\u2019t capture the balanced/nuanced main idea.\n\u2022 Below UnT6: Cannot distinguish the main idea from supporting details, or provides an inaccurate summary."},
  {id:"q15",type:"written",level:"UnT7\u20138",stem:"Dr James Howard talks about \u2018passive scrolling\u2019 versus \u2018active screen use\u2019. In your own words, explain the difference. Why do you think the author included this expert\u2019s opinion?",lines:6,ms:"WHAT TO LOOK FOR:\n\u2022 UnT7 (established) \u2014 Explaining the difference: Passive scrolling = mindlessly flicking through content without purpose or engagement. Active screen use = doing something intentional like creating content, communicating with friends, or learning. Student should explain in their OWN WORDS, not just copy the text. Look for evidence they understand the concept, not just the definition.\n\u2022 UnT8 (extending) \u2014 Why the author included it: This is where the higher-level thinking comes in. The student should explain that the author included this expert because: (a) it adds AUTHORITY/CREDIBILITY to the argument \u2014 Dr Howard is a psychologist at a university; (b) it moves the argument BEYOND a simple \u2018screens are bad\u2019 position to a more nuanced one; (c) it gives the reader a practical way to think about their own screen use. Top responses will also note that quoting an expert is a persuasive technique.\n\u2022 Partial (UnT6\u20137): Explains the difference accurately but gives a surface-level reason for inclusion (\u2018because he\u2019s an expert\u2019) without explaining the effect on the reader or argument.\n\u2022 Below UnT6: Cannot explain the difference or gives an inaccurate explanation."},
  {id:"q16",type:"written",level:"UnT8",stem:"The final paragraph says \u2018finding the right balance requires ongoing conversation\u2019. What does the author mean by \u2018balance\u2019 in this context? Do you think the author has presented a balanced view in this text? Use evidence from the text to support your answer.",lines:7,ms:"WHAT TO LOOK FOR:\n\u2022 UnT8 (extending) \u2014 TWO PARTS to this question:\n\nPart 1 \u2014 What \u2018balance\u2019 means: Not too much and not too little screen time. The middle ground between banning screens entirely and allowing unlimited access. Student should explain this is about finding the right amount/type of screen use.\n\nPart 2 \u2014 Is the text itself balanced? This is the key UnT8 skill (identifies author\u2019s perspective, evaluates texts). A strong response will:\n\u2022 Argue YES with evidence: The text presents both negatives (para 2) and positives (para 3), includes an expert who offers nuance (para 4), and acknowledges the difficulty for parents/schools (para 5).\n\u2022 OR argue NO with evidence: The text OPENS with concerning statistics, the positive section is shorter, the expert quote is used to QUALIFY rather than celebrate screen use, and the final sentence (\u2018put the phone down\u2019) reveals the author leans toward caution.\n\u2022 OR argue PARTIALLY balanced: Acknowledges both sides are present but notes the text leans one way.\n\nThe quality of the argument matters more than the position taken. Look for: citing specific parts of the text, explaining how the structure/language reveals perspective, and forming a justified judgement.\n\n\u2022 Partial (UnT7): Explains what \u2018balance\u2019 means but gives a surface response to part 2 (\u2018yes because it talks about good and bad things\u2019) without citing specific evidence.\n\u2022 Below UnT7: Cannot explain what balance means in context or gives an opinion without any text evidence."},
]},
{id:"textC",title:"Section 3: Text C \u2014 Analysis & Evaluation (UnT8\u201311)",passage:"C",questions:[
  {id:"q17",type:"mcq",level:"UnT8",stem:"What is the author\u2019s main argument?",options:["Teenagers should go to bed earlier","Schools should start later because of teenage sleep biology","Parents should not wake their children early","California has the best school system"],answer:1,ms:"Identifies the author\u2019s main argument/perspective (UnT8). The entire text builds the case for later school starts based on sleep science. Students must distinguish the AUTHOR\u2019S argument from related but incorrect options."},
  {id:"q18",type:"written",level:"UnT8\u20139",stem:"Identify the author\u2019s perspective on school start times. Use at least TWO pieces of evidence from the text to support your answer.",lines:6,ms:"WHAT TO LOOK FOR:\n\u2022 UnT8 (extending): Identifies the perspective (author favours later school starts) and provides at least one piece of evidence. May describe evidence generally (\u2018they talk about how bad it is for teenagers\u2019).\n\u2022 UnT9 (proficient): Identifies the perspective AND provides TWO or more SPECIFIC pieces of evidence with explanation of how each supports the perspective. Strong evidence includes:\n  \u2014 The emotive opening: \u2018drag themselves out of bed\u2019, \u2018struggling to concentrate\u2019 \u2014 positions teenagers as victims\n  \u2014 The rhetorical question: \u2018are we setting our young people up to fail?\u2019 \u2014 implies current system is harmful\n  \u2014 The expert quote from Dr Torres comparing 8:30am to 5:30am \u2014 makes current times seem unreasonable\n  \u2014 The 58% depression statistic \u2014 creates urgency\n  \u2014 The counter-argument is brief (one paragraph) then immediately dismissed (\u2018But when we weigh convenience against...\u2019)\n  \u2014 The final metaphor: \u2018the alarm clock is ringing\u2019 \u2014 a call to action\n  \u2014 Inclusive language \u2018we\u2019, \u2018our teenagers\u2019 \u2014 creates shared responsibility\n\u2022 Below UnT8: States a position but provides no evidence, or provides evidence that doesn\u2019t actually support the claim."},
  {id:"q19",type:"written",level:"UnT9",stem:"Summarise the key arguments in this text in 3\u20134 sentences. Include both sides of the debate.",lines:6,ms:"WHAT TO LOOK FOR:\n\u2022 UnT9 (proficient): Provides a CONCISE summary that captures the key arguments from BOTH sides without excessive detail. Should include:\n  FOR later starts: teenage biology (circadian rhythm shift), health consequences (depression, poor academics, weak immune system, risk-taking), overseas evidence (California improvements)\n  AGAINST later starts: childcare problems for parents, clashes with after-school sport, family schedule disruption\n  A strong summary will be 3\u20134 sentences, use the student\u2019s OWN WORDS (not copied phrases), and be balanced in covering both sides even though the text isn\u2019t.\n\u2022 Partial (UnT8): Summarises one side well but barely mentions the other, or is too detailed/too brief. May copy phrases directly from the text.\n\u2022 Below UnT8: Cannot summarise \u2014 either retells the entire text, or provides an incomplete/inaccurate summary, or only covers one side."},
  {id:"q20",type:"written",level:"UnT10",stem:"\u2018The alarm clock is ringing \u2014 it\u2019s time to wake up to the evidence.\u2019 Explain the layers of meaning in this sentence beyond the literal.",lines:6,ms:"WHAT TO LOOK FOR:\n\u2022 UnT10 (advanced): Identifies MULTIPLE layers of meaning and explains how they connect to the argument:\n  Layer 1 \u2014 LITERAL: An alarm clock making a sound; someone waking up\n  Layer 2 \u2014 METAPHORICAL: Society/schools need to \u2018wake up\u2019 to the scientific evidence about teenage sleep. The alarm clock symbolises an urgent warning.\n  Layer 3 \u2014 THEMATIC CONNECTION: The alarm clock metaphor is connected to the SLEEP THEME of the entire text \u2014 it brings the argument full circle\n  Layer 4 \u2014 CALL TO ACTION: \u2018It\u2019s time\u2019 is an imperative that demands immediate response from the reader\n  Layer 5 \u2014 IMPLIED CRITICISM: \u2018Wake up\u2019 implies that society has been \u2018asleep\u2019 (ignorant/complacent) on this issue\n  A top response will identify at least 3 of these layers and explain how they work together.\n\u2022 Partial (UnT9): Identifies the metaphor (\u2018it means we should pay attention to the evidence\u2019) but doesn\u2019t unpack multiple layers or connect to the text\u2019s themes.\n\u2022 Below UnT9: Takes the sentence literally or gives a vague response without explaining the figurative meaning."},
  {id:"q21",type:"written",level:"UnT10",stem:"Analyse how the author positions the reader to agree with their argument. Consider language choices, structure and persuasive techniques used throughout the text.",lines:8,ms:"WHAT TO LOOK FOR:\n\u2022 UnT10 (advanced): Provides a STRUCTURED ANALYSIS that covers multiple techniques with specific examples:\n\n  LANGUAGE CHOICES:\n  \u2014 Emotive language: \u2018drag themselves\u2019, \u2018exhausted\u2019, \u2018struggling\u2019 \u2014 creates sympathy for teenagers\n  \u2014 Inclusive pronouns: \u2018we\u2019, \u2018our teenagers\u2019, \u2018ourselves\u2019 \u2014 makes reader feel personally responsible\n  \u2014 Evaluative vocabulary: \u2018convenience\u2019 (dismisses opposition), \u2018serious\u2019 (creates urgency)\n  \u2014 Imperative language: \u2018it\u2019s time to wake up\u2019 \u2014 demands action\n\n  STRUCTURE:\n  \u2014 Opens with emotional appeal (not data) to hook the reader\n  \u2014 Builds the case gradually: emotional appeal \u2192 science \u2192 statistics \u2192 overseas evidence\n  \u2014 Counter-argument placed in paragraph 5 (near the end) and is brief (one paragraph vs four paragraphs for the main argument)\n  \u2014 Counter-argument immediately followed by dismissal (\u2018But when we weigh...\u2019)\n  \u2014 Ends with a metaphor that connects back to the sleep theme\n\n  TECHNIQUES:\n  \u2014 Rhetorical question: \u2018are we setting our young people up to fail?\u2019\n  \u2014 Expert authority: Dr Torres quote (university researcher = credibility)\n  \u2014 Statistics: 58% depression figure (creates shock/urgency)\n  \u2014 Analogy: 8:30am for teens = 5:30am for adults (makes it relatable)\n  \u2014 Overseas comparison: California evidence (shows it\u2019s possible and effective)\n\n  A top response will cover at least 3\u20134 techniques with SPECIFIC EXAMPLES from the text and explain the EFFECT on the reader.\n\u2022 Partial (UnT9): Identifies 1\u20132 techniques correctly but analysis is surface-level (\u2018they use statistics to be convincing\u2019) without explaining the specific effect or citing exact examples.\n\u2022 Partial (UnT8): Identifies that the author is persuasive but cannot explain HOW or gives very general statements.\n\u2022 Below UnT8: Cannot identify persuasive techniques or confuses analysis with opinion (\u2018I agree with the author because...\u2019)."},
  {id:"q22",type:"written",level:"UnT11",stem:"Critically evaluate this persuasive text. Consider: the strength of the reasoning and evidence, any information that has been omitted or oversimplified, the assumptions and values underlying the argument, and whether you find it convincing. Justify your evaluation with specific text references.",lines:10,ms:"WHAT TO LOOK FOR:\n\u2022 UnT11 (sophisticated): Provides a BALANCED CRITICAL EVALUATION that goes beyond agreeing or disagreeing. Must address most of these areas:\n\n  STRENGTH OF EVIDENCE:\n  \u2014 The 58% depression statistic is from one study \u2014 is one study sufficient? How large was the sample?\n  \u2014 The California evidence is described vaguely (\u2018early results show improvements\u2019) \u2014 no specific data provided\n  \u2014 Only one expert is quoted \u2014 is one expert enough to represent scientific consensus?\n  \u2014 The expert\u2019s analogy (8:30am = 5:30am) is memorable but is it scientifically accurate or an oversimplification?\n\n  OMISSIONS/OVERSIMPLIFICATIONS:\n  \u2014 No mention of the cost of implementation (infrastructure, transport, staffing)\n  \u2014 No consideration of how later starts affect teachers and other staff\n  \u2014 Assumes all teenagers have the same sleep patterns \u2014 individual variation is ignored\n  \u2014 No mention of student responsibility (staying up late on devices, caffeine use)\n  \u2014 No discussion of whether there are other solutions besides changing start times (sleep education, device curfews)\n  \u2014 Doesn\u2019t address the fact that many Australian teenagers also have part-time jobs\n\n  ASSUMPTIONS AND VALUES:\n  \u2014 Assumes student wellbeing should take priority over practical/economic concerns\n  \u2014 Assumes the education system should adapt to students rather than students adapting to the system\n  \u2014 Values scientific evidence over tradition and convenience\n  \u2014 Assumes that what works in California will work in Australia (different contexts)\n\n  OVERALL EVALUATION:\n  \u2014 The student should form a clear judgement about whether the text is convincing and WHY\n  \u2014 The QUALITY of the evaluation matters more than the position taken\n  \u2014 A top response will acknowledge the text\u2019s strengths AND weaknesses, not just attack or agree\n\n\u2022 Partial (UnT10): Evaluates some aspects but doesn\u2019t cover all areas. May focus mainly on what\u2019s IN the text rather than what\u2019s MISSING. Analysis may be one-sided (all positive or all negative).\n\u2022 Partial (UnT9): Can identify that the text is persuasive and may note one or two limitations, but doesn\u2019t provide a structured evaluation or cite specific text evidence.\n\u2022 Below UnT9: Gives a personal opinion without text evidence (\u2018I think schools should start later because I\u2019m tired\u2019) or simply agrees/disagrees without analysis."},
]},
{id:"vocab",title:"Section 4: Vocabulary",passage:null,questions:[
  {id:"q23",type:"written",level:"UnT5\u20136",stem:"In Text A, the word \u2018herbivore\u2019 is used. What does it mean? How does the text help you work out its meaning?",lines:3,ms:"WHAT TO LOOK FOR:\n\u2022 UnT6: Uses context and grammar knowledge to understand unfamiliar words. Herbivore = an animal that eats only plants. The text helps because it defines the word directly: \u2018meaning they only eat plants\u2019. Student should identify both the meaning AND explain how the text provides the definition.\n\u2022 UnT5: Gives the correct meaning but doesn\u2019t explain how the text helped.\n\u2022 Below UnT5: Cannot determine the meaning or gives an incorrect definition."},
  {id:"q24",type:"written",level:"UnT6\u20137",stem:"In Text B, Dr Howard uses the term \u2018passive scrolling\u2019. The prefix \u2018passive\u2019 comes from Latin meaning \u2018to suffer\u2019 or \u2018to allow\u2019. How does knowing this help you understand what \u2018passive scrolling\u2019 means?",lines:4,ms:"WHAT TO LOOK FOR:\n\u2022 UnT7: Uses etymological knowledge to explain meaning. Passive = allowing things to happen to you without acting or choosing. Passive scrolling = scrolling without actively engaging, choosing, or doing anything purposeful \u2014 letting content just wash over you. Student should connect the Latin origin to the modern meaning in context.\n\u2022 UnT6: Explains what passive scrolling means from context but doesn\u2019t connect to the Latin etymology.\n\u2022 Below UnT6: Cannot explain the term or the connection to its origin."},
  {id:"q25",type:"written",level:"UnT7\u20138",stem:"Break the word \u2018unprecedented\u2019 into its parts (prefix, root, suffix) and explain what each part contributes to the overall meaning.",lines:4,ms:"WHAT TO LOOK FOR:\n\u2022 UnT8: Accurate morphological breakdown with clear explanation:\n  \u2018un-\u2019 = not (prefix that negates)\n  \u2018precedent\u2019 = something that has happened or existed before (root word)\n  \u2018-ed\u2019 = turns it into a describing/adjective form (suffix)\n  Overall meaning: something that has never happened before, without any previous example\n\u2022 UnT7: Gives the correct overall meaning and identifies at least the prefix, but breakdown may be incomplete.\n\u2022 Below UnT7: Cannot break the word into parts or gives an incorrect meaning."},
