function genPDF(sn,yl,spA,spScore,spLevel,edA,edLvls,pA,pLvl,cA,cLvl,cOpt,isTM){
  const w=window.open('','_blank');
  let h=`<!DOCTYPE html><html><head><title>Writing Results \u2014 ${sn}</title><style>@page{size:A4;margin:18mm 14mm}body{font-family:Arial,sans-serif;font-size:11px;color:#1a1a1a;line-height:1.5}h1{font-size:18px;color:#C44536;border-bottom:3px solid #C44536;padding-bottom:8px;margin-bottom:10px}h2{font-size:13px;color:#C44536;margin-top:18px;margin-bottom:6px;border-bottom:1px solid #E8A49C;padding-bottom:3px}.info{margin-bottom:14px}.info span{font-size:11px;margin-right:20px}.info strong{color:#C44536}.score{background:#C44536;color:white;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:bold;display:inline-block;margin:6px 0}.sp-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #eee;font-size:11px}.ok{color:#2D6A4F;font-weight:bold}.no{color:#C44536}.ans{background:#f9f9f6;border:1px solid #E2DFD8;border-radius:5px;padding:8px 12px;font-size:10px;white-space:pre-line;min-height:40px;margin-top:4px}.tbox{border:2px dashed #E8A49C;border-radius:5px;padding:6px 10px;margin-top:6px;min-height:24px}.tlbl{font-size:9px;color:#C44536;font-weight:bold;text-transform:uppercase}table.sum{width:100%;border-collapse:collapse;margin-top:10px}table.sum th{background:#C44536;color:white;padding:5px 8px;text-align:left;font-size:10px}table.sum td{border:1px solid #E2DFD8;padding:5px 8px;font-size:10px}.lc{min-width:70px;height:20px}.wc{font-size:10px;color:#888;margin-top:2px}</style></head><body>`;
  h+=`<h1>Baseline Literacy Test \u2014 Writing</h1><div class="info"><span><strong>Student:</strong> ${sn}</span><span><strong>Year:</strong> ${yl}</span><span><strong>Date:</strong> ${new Date().toLocaleDateString('en-AU')}</span></div>`;
  h+=`<h2>Spelling</h2><div class="score">Score: ${spScore}/${SPELL.length}</div>`;
  SPELL.forEach((w2,i)=>{const sa=(spA['sp_'+i]||'').trim();const ok=sa.toLowerCase()===w2.word.toLowerCase();h+=`<div class="sp-row"><span>${i+1}. <strong>${w2.level}</strong></span><span>${sa||'\u2014'}</span><span class="${ok?'ok':'no'}">${ok?'\u2713':'\u2717 ('+w2.word+')'}</span></div>`;});
  h+=`<div class="tbox"><span class="tlbl">Spelling Level: ${isTM&&spLevel?spLevel:'_______________'}</span></div>`;
  h+=`<h2>Editing</h2><div class="ans">${edA||'<em style="color:#999">No response</em>'}</div>`;
  h+=isTM?`<div class="tbox"><span class="tlbl">Grammar: ${edLvls.gra||'___'} | Punctuation: ${edLvls.pun||'___'} | Spelling: ${edLvls.spg||'___'}</span></div>`:`<div class="tbox"><span class="tlbl">Grammar: _______ | Punctuation: _______ | Spelling: _______</span></div>`;
  const pWc=(pA||'').split(/\s+/).filter(Boolean).length;
  h+=`<h2>Persuasive</h2><div class="wc">${pWc} words</div><div class="ans">${pA||'<em style="color:#999">No response</em>'}</div><div class="tbox"><span class="tlbl">CrT Level: ${isTM&&pLvl?pLvl:'_______________'}</span></div>`;
  const cWc=(cA||'').split(/\s+/).filter(Boolean).length;const cType=cOpt===0?'Imaginative':cOpt===1?'Informative':'Choice';
  h+=`<h2>${cType}</h2><div class="wc">${cWc} words</div><div class="ans">${cA||'<em style="color:#999">No response</em>'}</div><div class="tbox"><span class="tlbl">CrT Level: ${isTM&&cLvl?cLvl:'_______________'}</span></div>`;
  h+=`<h2>Summary</h2><table class="sum"><tr><th>Sub-element</th><th>Level</th></tr>`;
  h+=`<tr><td>Spelling (dictation)</td><td class="lc">${isTM&&spLevel?spLevel:''} (${spScore}/${SPELL.length})</td></tr>`;
  h+=`<tr><td>Grammar (editing)</td><td class="lc">${isTM&&edLvls.gra?edLvls.gra:''}</td></tr>`;
  h+=`<tr><td>Punctuation (editing)</td><td class="lc">${isTM&&edLvls.pun?edLvls.pun:''}</td></tr>`;
  h+=`<tr><td>Spelling (editing)</td><td class="lc">${isTM&&edLvls.spg?edLvls.spg:''}</td></tr>`;
  h+=`<tr><td>CrT \u2014 Persuasive</td><td class="lc">${isTM&&pLvl?pLvl:''}</td></tr>`;
  h+=`<tr><td>CrT \u2014 ${cType}</td><td class="lc">${isTM&&cLvl?cLvl:''}</td></tr></table>`;
  h+=`<div class="tbox" style="margin-top:14px"><span class="tlbl">Comments / Next Steps:</span><br><br><br></div>`;
  h+=`<script>window.onload=function(){window.print();}<\/script></body></html>`;
  w.document.write(h);w.document.close();
}
